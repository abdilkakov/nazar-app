            excerpt: 'Жасұлан мен Серік ҚБТУ жатақхана бөлмесінде екі апта бойы отырып, веб-камераны адам экраннан көзін алғанда анықтауға үйретуге тырысты. Бірінші нұсқа дөрекі haar-cascade детекторы мен көптеген қатты кодталған шектерді пайдаланды. Жақсы жұмыс істемеді — бірақ жеткілікті жұмыс істеді. Камераның алдында отырып, телефонға қарағанда санның өзгеретінін көре алдық. Бұл түсінген сәтіміз болды: бұл жоба емес — өнім. Атауды Нұрислам ойлап тапты: «Назар» — қазақша көз, назар, көз тию.',
            stat: 'Прототип #1'
          },
          {
            date: '2026 жыл, 27 қаңтар',
            cat: 'Бастау',
            title: 'Идея: ноутбук сіздің алаңдағаныңызды көре алса ше?',
            excerpt: 'Бәрі тітіркенуден басталды. Жасұлан бірнеше ай бойы Pomodoro таймерлерін пайдаланды және жағымсыз нәрсені байқады: 25 минуттық таймер қосып, телефонды алты рет тексеретін, бірақ таймер бәрібір 25 минут жұмыс істедің дейді. Таймер өтірік айтатын. Әдейі емес — ол жай біле алмады. Сонда сұрақ туды: бірдеңе біле алса ше? Ноутбуктың камерасы — тура мына жерде, әрқашан қосулы, әрқашан қарап отыр — назарыңыз туралы шындықты айта алса ше? Бұл сұрақ Nazar-ға айналды.',
            stat: 'Нөлінші күн'
          }
        ]
      }
    };
  </script>

  <script type="text/babel">
    // ===== Blog App =====
    const { useState, useEffect } = React;

    // Mesh background
    function Mesh() {
      return (
        <div className="mesh">
          <div className="mesh-blob c"></div>
          <div className="mesh-blob d"></div>
        </div>
      );
    }

    // Icons
    function SunIcon() { return (<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" strokeWidth="1.4" /><path d="M8 1.5v2M8 12.5v2M14.5 8h-2M3.5 8h-2M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4M12.6 12.6l-1.4-1.4M4.8 4.8L3.4 3.4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" /></svg>); }
    function MoonIcon() { return (<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13 9.3A5.5 5.5 0 1 1 6.7 3a4.5 4.5 0 0 0 6.3 6.3z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round" /></svg>); }

    // Category color mapping
    function catColor(cat) {
      const c = cat.toLowerCase();
      if (c === 'product' || c === 'продукт' || c === 'өнім') return 'var(--c-violet)';
      if (c === 'traction' || c === 'трекшн') return 'var(--c-mint)';
      if (c === 'platform' || c === 'платформа') return 'var(--c-blue)';
      if (c === 'engineering' || c === 'инженерия') return 'var(--c-amber)';
      if (c === 'origin' || c === 'начало' || c === 'бастау') return 'var(--c-pink)';
      return 'var(--c-blue)';
    }

    // Blog card
    function BlogCard({ post, index }) {
      const color = catColor(post.cat);
      return (
        <article className="blog-card" style={{ '--card-accent': color }}>
          <div className="blog-card-header">
            <span className="blog-card-date">{post.date}</span>
            <span className="blog-card-cat" style={{ color: color, borderColor: color }}>{post.cat}</span>
          </div>
          <h2 className="blog-card-title">{post.title}</h2>
          <p className="blog-card-excerpt">{post.excerpt}</p>
          {post.stat && (
            <div className="blog-card-stat">
              <span className="blog-card-stat-dot" style={{ background: color, boxShadow: `0 0 8px ${color}` }}></span>
              {post.stat}
            </div>
          )}
          <div className="blog-card-num">{'0' + (index + 1)}</div>
        </article>
      );
    }

    // Timeline dot
    function TimelineDot({ color, isFirst }) {
      return (
        <div className="blog-timeline-dot" style={{ background: color, boxShadow: `0 0 10px ${color}` }}>
          {isFirst && <span className="blog-timeline-pulse" style={{ borderColor: color }}></span>}
        </div>
      );
    }

    // Blog Nav
    function BlogNav({ L, lang, setLang, mode, setMode }) {
      return (
        <nav className="nav">
          <a href="/" className="nav-logo" style={{ textDecoration: 'none' }}>
            <span className="nav-logo-mark"></span>
            Nazar
          </a>
          <div className="nav-links">
            <a href="/" style={{ fontSize: 13, color: 'var(--ink-3)' }}>{L.nav_back}</a>
          </div>
          <div className="nav-right">
            <button className="mode-toggle" onClick={() => setMode(mode === 'dark' ? 'light' : 'dark')} title="Toggle theme">
              {mode === 'dark' ? <SunIcon /> : <MoonIcon />}
            </button>
            <div className="lang">
              {['en', 'ru', 'kk'].map(code => (
                <button key={code} className={lang === code ? 'on' : ''} onClick={() => setLang(code)}>
                  {code.toUpperCase()}
                </button>
              ))}
            </div>
          </div>
        </nav>
      );
    }

    // Blog Hero
    function BlogHero({ L }) {
      return (
        <header className="blog-hero">
          <div className="wrap">
            <div className="eyebrow">
              <span className="dot"></span>{L.blog_title.toUpperCase()}
            </div>
            <h1 className="h1" style={{ maxWidth: '16ch' }}>
              {L.blog_hero_h.split('.')[0]}
              <span style={{ color: 'var(--ink-3)', fontWeight: 500 }}>.</span>
            </h1>
            <p className="lede">{L.blog_hero_sub}</p>
          </div>
        </header>
      );
    }

    // Blog Footer
    function BlogFooter({ L }) {
      return (
        <footer className="footer">
          <div className="wrap">
            <div className="footer-card">
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 16 }}>
                <div>
                  <div className="nav-logo" style={{ marginBottom: 8, padding: 0 }}>
                    <span className="nav-logo-mark"></span>
                    Nazar
                  </div>
                  <p style={{ fontSize: 13, color: 'var(--ink-3)', maxWidth: '30ch', marginTop: 4 }}>{L.footer_tag}</p>
                </div>
                <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
                  <span className="kz-badge">
                    <span className="kz-flag"></span>
                    {L.footer_built}
                  </span>
                  <a href="/" className="btn btn-ghost" style={{ fontSize: 13, padding: '8px 14px' }}>← {L.nav_back}</a>
                </div>
              </div>
              <div className="footer-bottom">
                <span>{L.footer_copy}</span>
                <span>Zhassulan, Serik & Nurislam</span>
              </div>
            </div>
          </div>
        </footer>
      );
    }

    // Main App
    function BlogApp() {
      const [lang, setLang] = useState(() => {
        const stored = localStorage.getItem('nazar.lang');
        if (stored && BLOG_I18N[stored]) return stored;
        const nav = (navigator.language || 'en').slice(0, 2);
        return BLOG_I18N[nav] ? nav : 'en';
      });
      useEffect(() => { localStorage.setItem('nazar.lang', lang); }, [lang]);
      const L = BLOG_I18N[lang];

      const [mode, setMode] = useState(() => localStorage.getItem('nazar.mode') || 'light');
      useEffect(() => {
        document.documentElement.setAttribute('data-mode', mode);
        document.documentElement.setAttribute('data-mesh', localStorage.getItem('nazar.mesh') || 'aurora');
        localStorage.setItem('nazar.mode', mode);
      }, [mode]);

      return (
        <>
          <Mesh />
          <BlogNav L={L} lang={lang} setLang={setLang} mode={mode} setMode={setMode} />
          <BlogHero L={L} />

          <section className="blog-section">
            <div className="wrap">
              <div className="blog-timeline">
                {L.posts.map((post, i) => (
                  <div className="blog-timeline-row" key={i}>
                    <div className="blog-timeline-line-wrap">
                      <TimelineDot color={catColor(post.cat)} isFirst={i === 0} />
                      {i < L.posts.length - 1 && <div className="blog-timeline-line"></div>}
                    </div>
                    <BlogCard post={post} index={i} />
                  </div>
                ))}
              </div>
            </div>
          </section>

          <BlogFooter L={L} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BlogApp />);
  </script>
</body>

</html>
